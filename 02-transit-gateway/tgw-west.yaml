AWSTemplateFormatVersion: '2010-09-09'
Description: West Transit Gateway and VPC attachment (us-west-2)

Parameters:
  VPCWestId:
    Type: String
    Description: VPC ID from West stack
  PrivateSubnetWestId:
    Type: String
    Description: Private Subnet ID from West stack

Resources:

  # --- Transit Gateway (West) ---
  TGWWest:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 64513
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Description: West Transit Gateway
      Tags:
        - Key: Name
          Value: tgw-west

  # --- TGW Attachment to West VPC ---
  TGWAttachmentWest:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TGWWest
      VpcId: !Ref VPCWestId
      SubnetIds:
        - !Ref PrivateSubnetWestId
      Tags:
        - Key: Name
          Value: tgw-attach-west

Outputs:
  TGWWestId:
    Value: !Ref TGWWest
    Description: West Transit Gateway ID
  TGWAttachmentWestId:
    Value: !Ref TGWAttachmentWest
    Description: West TGW Attachment ID