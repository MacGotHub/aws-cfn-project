AWSTemplateFormatVersion: '2010-09-09'
Description: Simulated on-prem Site 1 (us-east-1) - 10.2.0.0/16

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access
  MyIPAddress:
    Type: String
    Description: Your public IP in CIDR format (e.g. 1.2.3.4/32)

Resources:

  # --- VPC ---
  VPCOnPremEast:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-onprem-east

  # --- Internet Gateway ---
  IGWOnPremEast:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: igw-onprem-east

  AttachIGWOnPremEast:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPCOnPremEast
      InternetGatewayId: !Ref IGWOnPremEast

  # --- Public Subnet ---
  PublicSubnetOnPremEast:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCOnPremEast
      CidrBlock: 10.2.1.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: public-subnet-onprem-east

  # --- Route Table ---
  RTOnPremEast:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCOnPremEast
      Tags:
        - Key: Name
          Value: rt-onprem-east

  RouteOnPremEast:
    Type: AWS::EC2::Route
    DependsOn: AttachIGWOnPremEast
    Properties:
      RouteTableId: !Ref RTOnPremEast
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGWOnPremEast

  SubnetRTAssocOnPremEast:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetOnPremEast
      RouteTableId: !Ref RTOnPremEast

  # --- Security Group ---
  SGOnPremEast:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and IPSec traffic
      VpcId: !Ref VPCOnPremEast
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIPAddress
        - IpProtocol: udp
          FromPort: 500
          ToPort: 500
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 4500
          ToPort: 4500
          CidrIp: 0.0.0.0/0
        - IpProtocol: 50
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 10.0.0.0/8
      Tags:
        - Key: Name
          Value: sg-onprem-east

  # --- Strongswan EC2 (Customer Gateway) ---
  StrongswanEast:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnetOnPremEast
      SecurityGroupIds:
        - !Ref SGOnPremEast
      SourceDestCheck: false
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y strongswan
          echo "net.ipv4.ip_forward = 1" >> /etc/sysctl.conf
          sysctl -p
      Tags:
        - Key: Name
          Value: strongswan-onprem-east

  # --- Elastic IP ---
  EIPOnPremEast:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref StrongswanEast
      Tags:
        - Key: Name
          Value: eip-onprem-east

Outputs:
  VPCOnPremEastId:
    Value: !Ref VPCOnPremEast
    Description: On-prem East VPC ID
  StrongswanEastPublicIP:
    Value: !Ref EIPOnPremEast
    Description: Public IP of Strongswan instance (use as Customer Gateway IP)
  StrongswanEastInstanceId:
    Value: !Ref StrongswanEast
    Description: Strongswan instance ID